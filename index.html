<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Notif Simulator</title>
    <style>
        body { font-family: sans-serif; background-color: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #282828; padding: 25px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { background-color: #ff0000; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        .status { margin-top: 15px; font-size: 13px; color: #aaa; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" width="60" alt="YT">
        <h2>YouTube Notif</h2>
        <p>Set detik timer:</p>
        <input type="number" id="timerInput" value="15">
        <button onclick="setNotification()">SET OK</button>
        <div class="status" id="statusMsg">Klik SET OK dan izinkan notifikasi</div>
    </div>

    <script>
        // Minta izin otomatis
        if ('Notification' in window) { Notification.requestPermission(); }

        function setNotification() {
            const sec = document.getElementById('timerInput').value;
            const statusMsg = document.getElementById('statusMsg');
            
            if (Notification.permission !== 'granted') {
                alert('Klik "Allow/Izinkan" pada notifikasi browser!');
                Notification.requestPermission();
                return;
            }

            statusMsg.innerText = `Berhasil! Notif akan muncul dalam ${sec} detik. Silakan kunci HP atau keluar ke menu utama (jangan tutup browser).`;

            setTimeout(() => {
                const title = "YouTube";
                const options = {
                    body: "VideoCreative Persiapan Kemah Besar 2026 X SIJA A",
                    icon: "https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png",
                    vibrate: [200, 100, 200]
                };

                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.ready.then(reg => {
                        reg.showNotification(title, options);
                    });
                } else {
                    new Notification(title, options);
                }
                statusMsg.innerText = "Notifikasi terkirim!";
            }, sec * 1000);
        }

        // Daftarkan Service Worker kosong agar bisa jalan di background
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
